version: '3.8'

services:
  auth-service:
    container_name: 'swosh_auth'
    build:
      context: .
      target: development # This matches the stage name in Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/swosh_auth_db
    volumes:
      - .:/usr/src/app
      # - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run start:dev
    networks:
      - auth-network

  postgres:
    image: postgres:15-alpine
    container_name: 'swosh_auth_db'
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=swosh_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - auth-network
  redis:
    image: redis:7-alpine
    container_name: swosh_auth_redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    environment:
      - REDIS_PASSWORD=password
    volumes:
      - redis_data:/data
    networks:
      - auth-network

  redis-insight:
    image: redis/redisinsight:latest
    container_name: swosh_redis_insight
    ports:
      - '5540:5540'
    depends_on:
      - redis
    networks:
      - auth-network

volumes:
  postgres_data:
  redis_data:

networks:
  auth-network:
    driver: bridge
